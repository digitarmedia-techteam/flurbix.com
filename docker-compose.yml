version: '3.8'

services:
  flurbix:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flurbix.com-site
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
        - webnet

networks:
  webnet:
    external: true